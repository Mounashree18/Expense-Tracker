<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,select,button{width:100%;padding:10px;margin:5px 0}
button{background:green;color:white;border:none}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
#mainPage{display:none}
</style>
</head>
<body>

<div class="container">

<div id="loginPage">
<h2>Login</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Create Account</button>
<p id="error" style="color:red"></p>
</div>

<div id="mainPage">

<h1>Expense Tracker</h1>

<button onclick="changePassword()">Change Password</button>
<button onclick="logout()">Logout</button>

<h2>Add Expense</h2>

<input type="date" id="date">

<select id="category">
<option>Food</option>
<option>Travel</option>
<option>Rent</option>
<option>Shopping</option>
<option>Bills</option>
<option>Other</option>
</select>

<input type="number" id="amount" placeholder="Amount">
<input type="text" id="description" placeholder="Description">

<button onclick="addExpense()">Add Expense</button>

<hr>

<h2>Monthly Report</h2>

<input type="month" id="filterMonth">

<button onclick="viewTotal()">View Total</button>
<button onclick="viewDetails()">View Details</button>

<h3>Monthly Total: ₹<span id="monthlyTotal">0</span></h3>

<table>
<thead>
<tr>
<th>Date</th>
<th>Category</th>
<th>Amount</th>
<th>Description</th>
</tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>

</div>
</div>

<script>

function register(){
let user=prompt("Create Username");
let pass=prompt("Create Password");

if(user && pass){
localStorage.setItem("user",user);
localStorage.setItem("pass",pass);
alert("Account Created");
}
}

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user===localStorage.getItem("user") &&
pass===localStorage.getItem("pass")){

localStorage.setItem("loggedIn","true");

document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";

}else{
document.getElementById("error").innerText=
"Invalid Username or Password";
}
}

function logout(){
localStorage.removeItem("loggedIn");
location.reload();
}

function changePassword(){

let oldPass=prompt("Current Password");

if(oldPass!==localStorage.getItem("pass")){
alert("Wrong Password");
return;
}

let newPass=prompt("New Password");

if(newPass){
localStorage.setItem("pass",newPass);
alert("Password Changed");
}
}

window.onload=function(){

if(localStorage.getItem("loggedIn")==="true"){

document.getElementById("loginPage").style.display="none";
document.getElementById("mainPage").style.display="block";
}
}

function getExpenses(){
return JSON.parse(localStorage.getItem("expenses"))||[];
}

function saveExpenses(expenses){
localStorage.setItem("expenses",
JSON.stringify(expenses));
}

function addExpense(){

let date=document.getElementById("date").value;
let category=document.getElementById("category").value;
let amount=document.getElementById("amount").value;
let description=document.getElementById("description").value;

if(date===""||amount===""){
alert("Enter Date and Amount");
return;
}

let expenses=getExpenses();

expenses.push({
date,
category,
amount:parseFloat(amount),
description
});

saveExpenses(expenses);

alert("Expense Added");

document.getElementById("date").value="";
document.getElementById("amount").value="";
document.getElementById("description").value="";
}

function viewTotal(){

let month=document.getElementById("filterMonth").value;
let total=0;

getExpenses().forEach(e=>{

if(e.date.startsWith(month)){
total+=e.amount;
}

});

document.getElementById("monthlyTotal").innerText=total;
document.getElementById("expenseTable").innerHTML="";
}

function viewDetails(){

let month=document.getElementById("filterMonth").value;
let body=document.getElementById("expenseTable");

body.innerHTML="";

let total=0;

getExpenses().forEach(e=>{

if(e.date.startsWith(month)){

let row=body.insertRow();

row.insertCell(0).innerHTML=e.date;
row.insertCell(1).innerHTML=e.category;
row.insertCell(2).innerHTML="₹"+e.amount;
row.insertCell(3).innerHTML=e.description;

total+=e.amount;
}
});

document.getElementById("monthlyTotal").innerText=total;
}

</script>

</body>
</html>
